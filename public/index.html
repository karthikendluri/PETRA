<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PETRA | Professional Pet Care</title>
    <style>
        :root {
            --primary: #b86f52;
            --primary-dark: #9a5a40;
            --text: #222222;
            --bg: #ffffff;
            --border: #dddddd;
        }

        body { font-family: sans-serif; margin: 0; color: var(--text); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Header Fixes */
        header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; font-size: 24px; text-decoration: none; color: inherit; }
        
        /* Grid Layout */
        .sitters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px 0;
        }

        .sitter-card {
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .sitter-card:hover { transform: translateY(-5px); }

        .book-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }

        .book-btn:active { background: var(--primary-dark); }

        /* Modal Logic */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<header class="container">
    <a href="#" class="logo">PETRA 🪨</a>
    <nav>
        <span>Welcome, <strong>Karthik</strong></span>
        <button onclick="logout()" style="margin-left: 10px; cursor: pointer;">Log out</button>
    </nav>
</header>

<div class="container">
    <h2>Top-rated sitters near you</h2>
    <div class="sitters-grid" id="sittersGrid">
        </div>
</div>

<div id="bookingModal" class="modal">
    <div style="background: white; padding: 30px; border-radius: 12px; position: relative; max-width: 400px; width: 90%;">
        <h3 id="modalSitterName">Book Sitter</h3>
        <p>Confirm booking for 1 hour session?</p>
        <button class="book-btn" onclick="confirmBooking()">Confirm My Booking</button>
        <button onclick="closeModal()" style="background: none; border: none; color: gray; cursor: pointer; margin-top: 10px; width: 100%;">Cancel</button>
    </div>
</div>

<script>
    const sitters = [
        { name: "Sarah Johnson", role: "Dog walker", rating: 4.9, price: 25 },
        { name: "Michael Chen", role: "Pet sitter", rating: 5.0, price: 30 },
        { name: "Jessica Davis", role: "Vet tech", rating: 4.8, price: 35 },
        { name: "David Wilson", role: "Groomer", rating: 4.9, price: 28 }
    ];

    let selectedSitter = "";

    function renderSitters() {
        const grid = document.getElementById('sittersGrid');
        grid.innerHTML = sitters.map(s => `
            <div class="sitter-card">
                <h3>${s.name}</h3>
                <p>${s.role}</p>
                <div style="color: #ffb400;">★ ${s.rating}</div>
                <p><strong>$${s.price} / hour</strong></p>
                <button class="book-btn" onclick="openBooking('${s.name}')">Book Now</button>
            </div>
        `).join('');
    }

    function openBooking(name) {
        selectedSitter = name;
        document.getElementById('modalSitterName').innerText = "Booking with " + name;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('bookingModal').style.display = 'none';
    }

    function confirmBooking() {
        alert("Success! Your session with " + selectedSitter + " has been scheduled.");
        closeModal();
    }

    function logout() {
        alert("Logging out...");
        window.location.reload();
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', renderSitters);
</script>

</body>
</html>
