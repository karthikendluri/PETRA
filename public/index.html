<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional pet care services. Dog walking, pet sitting, grooming, and daycare. Trusted by 10,000+ pet parents since 2019.">
    <title>PETRA | Professional Pet Care Services</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #b86f52;
            --primary-dark: #9a5a40;
            --secondary: #6c9ebf;
            --text: #222222;
            --text-light: #717171;
            --bg: #ffffff;
            --bg-gray: #f7f7f7;
            --border: #dddddd;
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            line-height: 1.5;
            background: var(--bg);
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }

        /* Header */
        .site-header {
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo { font-size: 28px; font-weight: 800; text-decoration: none; }
        .logo .petra { color: var(--primary); }
        .logo .rock { color: var(--text); }

        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 15px; font-weight: 500; }

        .btn-login { background: transparent; border: 1px solid var(--border); padding: 10px 24px; border-radius: 30px; cursor: pointer; }
        .btn-signup { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 30px; cursor: pointer; }

        .user-menu { display: none; align-items: center; gap: 16px; }
        .user-avatar {
            width: 40px; height: 40px; background: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
        }

        .logout-btn { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 14px; text-decoration: underline; }

        /* Hero */
        .hero { background: linear-gradient(135deg, #b86f5208 0%, #6c9ebf08 100%); padding: 60px 0; }
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .hero h1 { font-size: 48px; line-height: 1.2; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 18px; color: var(--text-light); margin-bottom: 30px; }
        .hero-image img { width: 100%; border-radius: 24px; height: 400px; object-fit: cover; }

        /* Sitters Grid */
        .sitters-section { padding: 60px 0; }
        .section-title { font-size: 32px; text-align: center; margin-bottom: 16px; }
        .section-subtitle { text-align: center; color: var(--text-light); margin-bottom: 48px; }

        .sitters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px; }
        .sitter-card { border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .sitter-card:hover { box-shadow: var(--shadow-hover); }
        .sitter-photo img { width: 100%; height: 200px; object-fit: cover; }
        .sitter-info { padding: 20px; }
        .stars { color: #ffb400; font-size: 14px; }
        .sitter-price { font-weight: bold; color: var(--primary); margin: 10px 0; }

        .book-sitter-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-content {
            background: var(--bg); border-radius: 24px; padding: 32px;
            width: 90%; max-width: 400px; position: relative;
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 10px; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container">
        <div class="header-content">
            <a href="#" class="logo"><span class="petra">PETRA</span><span class="rock">🪨</span></a>
            <div class="nav-links">
                <a href="#">Find sitters</a>
                <div id="authSection">
                    <button class="btn-login" onclick="openAuthModal('login')">Log in</button>
                    <button class="btn-signup" onclick="openAuthModal('signup')">Sign up</button>
                </div>
                <div id="userSection" class="user-menu">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userDisplayName">User</span>
                    <button class="logout-btn" onclick="logout()">Log out</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main>
    <section class="hero">
        <div class="container">
            <div class="hero-grid">
                <div>
                    <h1>Loving pet care <br>when <span>you're away</span></h1>
                    <p>Connect with trusted pet sitters in your neighborhood. Dog walking, pet sitting, and grooming.</p>
                    <button class="btn-signup" onclick="openAuthModal('signup')">Find a sitter →</button>
                </div>
                <div class="hero-image">
                    <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=600&h=400&fit=crop" alt="Happy dog">
                </div>
            </div>
        </div>
    </section>

    <section class="sitters-section">
        <div class="container">
            <h2 class="section-title">Top-rated sitters near you</h2>
            <p class="section-subtitle">Verified and background-checked</p>
            <div class="sitters-grid" id="sittersGrid"></div>
        </div>
    </section>
</main>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAuthModal()">&times;</span>
        <h2 id="modalTitle" style="margin-bottom:15px;">Welcome</h2>
        <div id="loginForm" class="auth-form active">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="book-sitter-btn" onclick="handleAuth('Karthik')">Log In</button>
        </div>
        <div id="signupForm" class="auth-form">
            <input type="text" id="signupName" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <button class="book-sitter-btn" onclick="handleAuth()">Create Account</button>
        </div>
    </div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeBookingModal()">&times;</span>
        <h2>Book Sitting</h2>
        <p id="modalSitterName" style="color: var(--primary); font-weight: bold; margin: 10px 0;"></p>
        <input type="text" id="userFullName" placeholder="Your Name">
        <input type="date" id="bookingDate">
        <select id="bookingService">
            <option value="walking">Dog Walking ($25)</option>
            <option value="sitting">Pet Sitting ($45)</option>
        </select>
        <button class="book-sitter-btn" onclick="confirmBooking()">Confirm My Booking</button>
    </div>
</div>

<script>
    const sitters = [
        { name: "Sarah Johnson", role: "Dog walker", rating: 4.9, price: 25, img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=300" },
        { name: "Michael Chen", role: "Pet sitter", rating: 5.0, price: 30, img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=300" },
        { name: "Jessica Davis", role: "Vet tech", rating: 4.8, price: 35, img: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=300" },
        { name: "David Wilson", role: "Groomer", rating: 4.9, price: 28, img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300" }
    ];

    let currentUser = JSON.parse(localStorage.getItem('petra_user'));
    let selectedSitter = "";

    function renderSitters() {
        const grid = document.getElementById('sittersGrid');
        grid.innerHTML = sitters.map(s => `
            <div class="sitter-card">
                <div class="sitter-photo"><img src="${s.img}" alt="${s.name}"></div>
                <div class="sitter-info">
                    <strong>${s.name}</strong>
                    <div style="font-size: 13px; color: gray;">${s.role}</div>
                    <span class="stars">★ ${s.rating}</span>
                    <div class="sitter-price">$${s.price} / hour</div>
                    <button class="book-sitter-btn" onclick="openBookingModal('${s.name}')">Book Now</button>
                </div>
            </div>
        `).join('');
    }

    function updateAuthUI() {
        const authSec = document.getElementById('authSection');
        const userSec = document.getElementById('userSection');
        if (currentUser) {
            authSec.style.display = 'none';
            userSec.style.display = 'flex';
            document.getElementById('userDisplayName').innerText = currentUser.name;
            document.getElementById('userAvatar').innerText = currentUser.name.charAt(0).toUpperCase();
        } else {
            authSec.style.display = 'flex';
            userSec.style.display = 'none';
        }
    }

    function openAuthModal(type) {
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('signupForm').style.display = type === 'signup' ? 'block' : 'none';
        document.getElementById('modalTitle').innerText = type === 'login' ? 'Log In' : 'Sign Up';
    }

    function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

    function handleAuth(manualName) {
        const name = manualName || document.getElementById('signupName').value || "User";
        currentUser = { name: name };
        localStorage.setItem('petra_user', JSON.stringify(currentUser));
        updateAuthUI();
        closeAuthModal();
    }

    function logout() {
        localStorage.removeItem('petra_user');
        currentUser = null;
        updateAuthUI();
    }

    function openBookingModal(name) {
        selectedSitter = name;
        document.getElementById('modalSitterName').innerText = "Sitter: " + name;
        document.getElementById('bookingModal').style.display = 'flex';
        if(currentUser) document.getElementById('userFullName').value = currentUser.name;
    }

    function closeBookingModal() { document.getElementById('bookingModal').style.display = 'none'; }

    function confirmBooking() {
        const name = document.getElementById('userFullName').value;
        const date = document.getElementById('bookingDate').value;
        if(!name || !date) return alert("Please fill in your name and date!");
        alert("🐾 Success! Booking confirmed for " + selectedSitter + " on " + date);
        closeBookingModal();
    }

    window.onload = () => {
        renderSitters();
        updateAuthUI();
    };
</script>
</body>
</html>
