<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PETRA | Live Professional Pet Care</title>
    <style>
        :root {
            --primary: #b86f52;
            --primary-dark: #9a5a40;
            --text: #222222;
            --text-light: #717171;
            --bg: #ffffff;
            --bg-gray: #f7f7f7;
            --border: #dddddd;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { color: var(--text); background: var(--bg); line-height: 1.6; scroll-behavior: smooth; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        header { 
            background: white; border-bottom: 1px solid var(--border); 
            padding: 15px 0; position: sticky; top: 0; z-index: 1000; 
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; text-decoration: none; color: var(--primary); }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 500; font-size: 14px; }
        
        .btn-auth { 
            padding: 8px 20px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border);
            font-size: 14px; transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); }

        /* Hero & Search */
        .hero { background: #fffcfb; padding: 60px 0; text-align: center; }
        .hero h1 { font-size: 42px; margin-bottom: 15px; }
        .hero span { color: var(--primary); }

        .search-container {
            max-width: 800px; margin: -40px auto 40px; background: white;
            padding: 25px; border-radius: 15px; box-shadow: var(--shadow);
            display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px;
            position: relative; z-index: 10;
        }
        .input-group { display: flex; flex-direction: column; text-align: left; }
        .input-group label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--text-light); }
        .input-group input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; }

        /* Grid */
        .results-section { padding: 40px 0; min-height: 400px; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; margin-top: 30px; 
        }
        
        .card { 
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden; 
            transition: transform 0.2s; background: white;
        }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-price { color: var(--primary); font-weight: bold; font-size: 18px; }
        .rating { color: #f39c12; font-size: 14px; }

        /* Modals */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; }
        
        /* Loading Spinner */
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="container header-flex">
        <a href="#" class="logo">PETRA 🪨</a>
        <div class="nav-links">
            <a href="#results">Find Sitters</a>
            <div id="auth-ui">
                <button class="btn-auth" onclick="toggleModal('authModal')">Login</button>
            </div>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Loving pet care <span>anytime.</span></h1>
    <p>Real-time listings from trusted local sitters.</p>
</section>

<div class="container">
    <div class="search-container">
        <div class="input-group">
            <label>LOCATION</label>
            <input type="text" id="locInput" placeholder="Zip code or City (e.g. Austin, TX)">
        </div>
        <div class="input-group">
            <label>SERVICE</label>
            <input type="text" id="servInput" placeholder="Dog Walking, Sitting...">
        </div>
        <button class="btn-auth btn-primary" onclick="fetchLiveData()" style="height: 48px; margin-top: 20px;">Search Live</button>
    </div>
</div>

<section class="results-section container" id="results">
    <h2 id="status-msg">Top-rated sitters near you</h2>
    <div class="grid" id="sittersGrid">
        </div>
</section>

<div id="authModal" class="modal" onclick="closeOnOutsideClick(event)">
    <div class="modal-content">
        <h3>Welcome to PETRA</h3>
        <input type="text" id="userName" placeholder="Your Name" style="width:100%; padding:10px; margin:15px 0; border:1px solid #ddd; border-radius:8px;">
        <button class="btn-auth btn-primary" style="width:100%" onclick="handleLogin()">Get Started</button>
    </div>
</div>

<script>
    const API_TOKEN = 'apify_api_ejTEau4mggYE7XQLL0I4w7YVlcvB9V491siY';
    let user = JSON.parse(localStorage.getItem('petra_user'));

    async function fetchLiveData() {
        const loc = document.getElementById('locInput').value;
        const serv = document.getElementById('servInput').value || 'dog-walking';
        const grid = document.getElementById('sittersGrid');
        const status = document.getElementById('status-msg');

        if (!loc) return alert("Please enter a location (e.g., '78701' or 'Austin')");

        // UI State: Loading
        status.innerText = `Sniffing out sitters in ${loc}...`;
        grid.innerHTML = '<div style="grid-column: 1/-1;"><div class="spinner"></div></div>';

        try {
            const response = await fetch(`https://api.apify.com/v2/acts/apify~rover-scraper/run-sync-get-dataset-items?token=${API_TOKEN}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "location": loc,
                    "service": serv,
                    "maxItems": 12
                })
            });

            const data = await response.json();

            if (!data || data.length === 0) {
                status.innerText = "No sitters found in that area.";
                grid.innerHTML = "";
                return;
            }

            status.innerText = `Showing ${data.length} live results for ${loc}`;
            grid.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.profilePhoto || 'https://via.placeholder.com/400x250'}" alt="${item.name}">
                    <div class="card-body">
                        <div class="rating">★ ${item.rating || '5.0'} (${item.reviewsCount || 0})</div>
                        <h4 style="margin: 5px 0;">${item.name}</h4>
                        <p style="font-size:12px; color:gray; height:35px; overflow:hidden;">${item.tagline || 'Verified Rover Sitter'}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <span class="card-price">$${item.price || '20'}/hr</span>
                            <button class="btn-auth btn-primary" onclick="window.open('${item.url}', '_blank')">Book</button>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            console.error(err);
            status.innerText = "Connection error. Please check your API limits.";
            grid.innerHTML = "";
        }
    }

    // UI Logic
    function handleLogin() {
        const name = document.getElementById('userName').value || 'Pet Lover';
        localStorage.setItem('petra_user', JSON.stringify({name}));
        location.reload();
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    function closeOnOutsideClick(e) {
        if(e.target.className === 'modal') e.target.style.display = 'none';
    }

    window.onload = () => {
        if(user) {
            document.getElementById('auth-ui').innerHTML = `<span>Hi, ${user.name}</span>`;
        }
    }
</script>

</body>
</html>
