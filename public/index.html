<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional pet care services. Dog walking, pet sitting, grooming, and daycare.">
    <title>PETRA | Professional Pet Care Services</title>
    <style>
        /* CSS Variables & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #b86f52;
            --primary-dark: #9a5a40;
            --secondary: #6c9ebf;
            --text: #222222;
            --text-light: #717171;
            --bg: #ffffff;
            --bg-gray: #f7f7f7;
            --border: #dddddd;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }

        /* Header */
        .site-header {
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo { font-size: 28px; font-weight: 800; text-decoration: none; display: flex; align-items: center; }
        .logo .petra { color: var(--primary); }

        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 15px; font-weight: 500; }
        .nav-links a:hover { color: var(--primary); }

        .btn-login { background: transparent; border: 1px solid var(--border); padding: 10px 24px; border-radius: 30px; cursor: pointer; }
        .btn-signup { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 30px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-signup:hover { background: var(--primary-dark); }

        /* Hero */
        .hero { background: linear-gradient(135deg, #b86f5208 0%, #6c9ebf08 100%); padding: 80px 0; }
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .hero h1 { font-size: 56px; line-height: 1.1; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 20px; color: var(--text-light); margin-bottom: 30px; }
        .hero-image img { width: 100%; border-radius: 24px; height: 450px; object-fit: cover; box-shadow: var(--shadow-hover); }

        /* Search */
        .search-section { margin-top: -50px; position: relative; z-index: 10; }
        .search-card { background: var(--bg); border-radius: 20px; box-shadow: var(--shadow-hover); padding: 25px; border: 1px solid var(--border); }
        .search-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-weight: 600; font-size: 14px; }
        .form-group input { padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; }

        /* Cards */
        .sitters-section { padding: 80px 0; }
        .section-title { font-size: 32px; text-align: center; margin-bottom: 40px; }
        .sitters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .sitter-card { border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: transform 0.3s; }
        .sitter-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .sitter-photo img { width: 100%; height: 220px; object-fit: cover; }
        .sitter-info { padding: 20px; }
        .sitter-price { font-weight: bold; color: var(--primary); font-size: 18px; margin: 10px 0; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .user-menu { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 35px; height: 35px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        footer { background: var(--bg-gray); padding: 40px 0; text-align: center; margin-top: 50px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container">
        <div class="header-content">
            <a href="#" class="logo"><span class="petra">PETRA</span><span>🪨</span></a>
            <nav class="nav-links">
                <a href="#sitters-anchor">Find sitters</a>
                <a href="#hero-anchor">About</a>
                <div id="authSection">
                    <button class="btn-login" onclick="openAuthModal('login')">Log in</button>
                    <button class="btn-signup" onclick="openAuthModal('signup')">Sign up</button>
                </div>
                <div id="userSection" style="display: none;" class="user-menu">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userDisplayName">User</span>
                    <button class="logout-btn" onclick="logout()" style="cursor:pointer; border:none; background:none; color:red; font-size:12px;">Logout</button>
                </div>
            </nav>
        </div>
    </div>
</header>

<main>
    <section class="hero" id="hero-anchor">
        <div class="container">
            <div class="hero-grid">
                <div>
                    <h1>Loving pet care <br>when <span>you're away</span></h1>
                    <p>Connect with trusted pet sitters in your neighborhood. Your pets deserve the best care.</p>
                    <a href="#sitters-anchor" class="btn-signup" style="text-decoration: none; display: inline-block;">Browse Sitters →</a>
                </div>
                <div class="hero-image">
                    <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=800" alt="Happy dog">
                </div>
            </div>
        </div>
    </section>

    <section class="search-section">
        <div class="container">
            <div class="search-card">
                <div class="search-form">
                    <div class="form-group">
                        <label>📍 Location</label>
                        <input type="text" id="locationInput" placeholder="Enter city (e.g. Austin)">
                    </div>
                    <div class="form-group">
                        <label>📅 Service Type</label>
                        <input type="text" id="serviceInput" placeholder="Walking, Sitting...">
                    </div>
                    <button class="btn-signup" style="padding: 15px 40px;" onclick="handleSearch()">Search</button>
                </div>
            </div>
        </div>
    </section>

    <section class="sitters-section" id="sitters-anchor">
        <div class="container">
            <h2 class="section-title">Verified Sitters</h2>
            <div class="sitters-grid" id="sittersGrid">
                </div>
        </div>
    </section>
</main>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('authModal')">&times;</span>
        <div id="loginForm" class="auth-form">
            <h2>Welcome Back</h2>
            <input type="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <button class="btn-signup" style="width:100%" onclick="login('Existing User')">Log In</button>
        </div>
        <div id="signupForm" class="auth-form">
            <h2>Create Account</h2>
            <input type="text" id="signupName" placeholder="Full Name" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <button class="btn-signup" style="width:100%" onclick="login()">Sign Up</button>
        </div>
    </div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('bookingModal')">&times;</span>
        <h2 id="bookingTitle">Book Sitter</h2>
        <p id="targetSitter" style="margin-bottom:20px; color:var(--primary); font-weight:bold;"></p>
        <label>Pick a Date</label>
        <input type="date" id="bookDate" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <button class="btn-signup" style="width:100%" onclick="finalizeBooking()">Confirm Booking</button>
    </div>
</div>

<footer>
    <div class="container">
        <p>© 2026 PETRA Pet Care, Inc. All rights reserved.</p>
    </div>
</footer>

<script>
    const sitters = [
        { name: "Sarah Johnson", role: "Dog walker", location: "Austin", rating: 4.9, price: 25, img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400" },
        { name: "Michael Chen", role: "Pet sitter", location: "Austin", rating: 5.0, price: 30, img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400" },
        { name: "Jessica Davis", role: "Vet tech", location: "Dallas", rating: 4.8, price: 35, img: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=400" },
        { name: "David Wilson", role: "Groomer", location: "Houston", rating: 4.9, price: 28, img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" }
    ];

    let currentUser = JSON.parse(localStorage.getItem('petra_user'));
    let activeSitter = null;

    function renderSitters(data = sitters) {
        const grid = document.getElementById('sittersGrid');
        if(data.length === 0) {
            grid.innerHTML = "<p style='text-align:center; width:100%; grid-column: 1/-1;'>No sitters found in that location.</p>";
            return;
        }
        grid.innerHTML = data.map(s => `
            <div class="sitter-card">
                <div class="sitter-photo"><img src="${s.img}" alt="${s.name}"></div>
                <div class="sitter-info">
                    <h3>${s.name}</h3>
                    <p style="color:gray; font-size:14px;">${s.role} • ${s.location}</p>
                    <p class="sitter-price">$${s.price}/hr</p>
                    <button class="btn-signup" style="width:100%" onclick="openBooking('${s.name}')">Book Now</button>
                </div>
            </div>
        `).join('');
    }

    // Search logic
    function handleSearch() {
        const loc = document.getElementById('locationInput').value.toLowerCase();
        const serv = document.getElementById('serviceInput').value.toLowerCase();
        
        const filtered = sitters.filter(s => 
            s.location.toLowerCase().includes(loc) && 
            s.role.toLowerCase().includes(serv)
        );
        renderSitters(filtered);
        document.getElementById('sitters-anchor').scrollIntoView();
    }

    // Auth logic
    function openAuthModal(mode) {
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('loginForm').classList.toggle('active', mode === 'login');
        document.getElementById('signupForm').classList.toggle('active', mode === 'signup');
    }

    function login(fixedName) {
        const nameInput = document.getElementById('signupName').value;
        const user = { name: fixedName || nameInput || "Pet Lover" };
        localStorage.setItem('petra_user', JSON.stringify(user));
        currentUser = user;
        location.reload(); // Refresh to update UI
    }

    function logout() {
        localStorage.removeItem('petra_user');
        location.reload();
    }

    // Booking logic
    function openBooking(sitterName) {
        if(!currentUser) {
            alert("Please log in first to book a sitter!");
            openAuthModal('login');
            return;
        }
        activeSitter = sitterName;
        document.getElementById('targetSitter').innerText = "Booking with " + sitterName;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function finalizeBooking() {
        const date = document.getElementById('bookDate').value;
        if(!date) return alert("Please select a date.");
        
        alert(`High paw! 🐾 Booking confirmed with ${activeSitter} for ${date}.`);
        closeModal('bookingModal');
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Init
    window.onload = () => {
        renderSitters();
        if(currentUser) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('userSection').style.display = 'flex';
            document.getElementById('userDisplayName').innerText = currentUser.name;
            document.getElementById('userAvatar').innerText = currentUser.name[0];
        }
    };
</script>

</body>
</html>
